# Nginx config: serves the React build and reverse-proxies /api/* + /api/ws/* to backend:8001.
# This file is COPYed into the frontend image and used inside docker-compose.

upstream algoforge_api {
    server backend:8001;
}

server {
    listen 80 default_server;
    server_name _;

    # Tight client-side limits — orders are tiny.
    client_max_body_size 4M;

    # React SPA build.
    root /usr/share/nginx/html;
    index index.html;

    # API + WebSocket reverse-proxy.
    location /api/ {
        proxy_pass         http://algoforge_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        # WS upgrade.
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 86400;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
